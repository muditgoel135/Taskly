version: "3.9"
services:
  web:
    build: { context: ., dockerfile: docker/Dockerfile.api }
    env_file: .env
    depends_on: [db, redis]
    ports: ["8000:8000"]
  worker:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    env_file: .env
    depends_on: [db, redis]
  beat:
    build: { context: ., dockerfile: docker/Dockerfile.worker }
    command: ["celery", "-A", "celery_app.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    depends_on: [redis]
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
volumes:
  pgdata:
